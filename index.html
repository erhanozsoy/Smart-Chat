<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Chat — Reply Assistant (Prototype)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Smart Chat</h1>
      <p class="subtitle">Paste a conversation, pick a tone, and get a reply suggestion you can edit and copy.</p>
      <p class="disclosure">Powered by Claude — replies are generated by AI. Always review before sending.</p>
    </header>

    <main class="card">
      <section class="field">
        <label for="conversation">Recent conversation</label>
        <textarea id="conversation" rows="6" placeholder="Paste the message or conversation you want to reply to..."></textarea>
      </section>

      <section class="field">
        <label for="instruction">Additional instruction <span class="optional">(optional)</span></label>
        <input id="instruction" type="text" placeholder="e.g. make it shorter, reply politely, translate to English" />
      </section>

      <section class="field">
        <span class="label-text">Tone</span>
        <div class="tone-options" role="radiogroup" aria-label="Reply tone">
          <button type="button" class="tone-option" data-tone="warm" role="radio" aria-checked="false">Warm</button>
          <button type="button" class="tone-option active" data-tone="professional" role="radio" aria-checked="true">Professional</button>
          <button type="button" class="tone-option" data-tone="short" role="radio" aria-checked="false">Short</button>
        </div>
      </section>

      <section class="actions">
        <button type="button" id="suggest-btn" class="btn btn-primary">Suggest Reply</button>
      </section>

      <section id="loading-state" class="loading-state hidden" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>Thinking of a reply…</span>
      </section>

      <section id="error-state" class="error-state hidden" role="alert">
        <p id="error-message">Something went wrong. Please try again.</p>
        <button type="button" id="error-retry-btn" class="btn btn-secondary">Try Again</button>
      </section>

      <section id="result-state" class="field result-state hidden">
        <label for="result">Suggested reply <span class="optional">(editable)</span></label>
        <textarea id="result" rows="5"></textarea>
        <div class="result-actions">
          <button type="button" id="copy-btn" class="btn btn-secondary">Copy</button>
          <button type="button" id="another-btn" class="btn btn-secondary">Another Reply</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
