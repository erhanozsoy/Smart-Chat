<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Chat</title>
<link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="panel">
    <header class="panel-header">
      <div class="header-top">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" focusable="false">
              <path
                d="M4 4.5h16a1.5 1.5 0 0 1 1.5 1.5v10a1.5 1.5 0 0 1-1.5 1.5H9.5L5 21v-3.5H4A1.5 1.5 0 0 1 2.5 16V6A1.5 1.5 0 0 1 4 4.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <line x1="7" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <line x1="7" y1="12.5" x2="13" y2="12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </span>
          <h1>Smart Chat</h1>
        </div>
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button
            type="button"
            class="theme-option"
            data-theme-choice="light"
            aria-pressed="false"
            aria-label="Light theme"
          >
            <svg class="theme-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="4" fill="currentColor" />
              <g stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </g>
            </svg>
            <span>Light</span>
          </button>
          <button
            type="button"
            class="theme-option"
            data-theme-choice="dark"
            aria-pressed="false"
            aria-label="Dark theme"
          >
            <svg class="theme-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false">
              <path
                d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z"
                fill="currentColor"
              />
            </svg>
            <span>Dark</span>
          </button>
        </div>
      </div>
      <div class="status" id="status">
        <span class="status-dot" id="status-dot" aria-hidden="true"></span>
        <span id="status-text">Checking server…</span>
      </div>
    </header>

    <main class="panel-body">
      <section class="field">
        <label for="conversation">Recent conversation</label>
        <textarea
          id="conversation"
          rows="6"
          placeholder="Select the recent conversation on the page, then click Capture Conversation."
        ></textarea>
        <button type="button" id="capture-btn" class="btn btn-secondary">Capture Conversation</button>
      </section>

      <section class="field">
        <label for="instruction">Additional instruction <span class="optional">(optional)</span></label>
        <input id="instruction" type="text" placeholder="e.g. make it shorter, reply politely" />
      </section>

      <section class="field">
        <span class="label-text">Tone</span>
        <div class="tone-options" role="radiogroup" aria-label="Reply tone">
          <button type="button" class="tone-option" data-tone="warm" role="radio" aria-checked="false">
            <svg class="tone-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
              <path
                d="M19.5 12.6 12 20l-7.5-7.4a4.8 4.8 0 0 1 0-6.8 4.9 4.9 0 0 1 6.9 0l.6.6.6-.6a4.9 4.9 0 0 1 6.9 0 4.8 4.8 0 0 1 0 6.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Warm
          </button>
          <button type="button" class="tone-option active" data-tone="professional" role="radio" aria-checked="true">
            <svg class="tone-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
              <rect
                x="3" y="7.5" width="18" height="12" rx="2"
                fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
              />
              <path
                d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"
                fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
              />
              <line x1="3" y1="13" x2="21" y2="13" stroke="currentColor" stroke-width="1.75" />
            </svg>
            Professional
          </button>
          <button type="button" class="tone-option" data-tone="short" role="radio" aria-checked="false">
            <svg class="tone-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
              <path
                d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Short
          </button>
        </div>
      </section>

      <section class="actions">
        <button type="button" id="suggest-btn" class="btn btn-primary">
          <svg class="suggest-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <polygon
              points="22 2 15 22 11 13 2 9 22 2"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <line
              x1="22" y1="2" x2="11" y2="13"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Suggest Reply
        </button>
      </section>

      <section id="loading-state" class="loading-state hidden" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>Thinking of a reply…</span>
      </section>

      <section id="error-state" class="error-state hidden" role="alert">
        <p id="error-message">Something went wrong. Please try again.</p>
      </section>

      <section id="result-state" class="field result-state hidden">
        <label for="result">Suggested reply <span class="optional">(editable)</span></label>
        <textarea id="result" rows="5"></textarea>
        <div class="result-actions">
          <button type="button" id="copy-btn" class="btn btn-utility">Copy</button>
          <button type="button" id="another-btn" class="btn btn-secondary">Another Reply</button>
        </div>
      </section>
    </main>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
